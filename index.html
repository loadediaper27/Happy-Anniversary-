<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>❤️ Happy Anniversary</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Libre+Baskerville:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Loading Screen -->

    <div id="loading-screen">

        <div class="loading-content">

            <div class="loading-heart">♡</div>

            <h1>Happy Anniversary</h1>

            <p id="loading-message">
                Loading memories...
            </p>

            <div class="loading-bar">

                <div id="progress"></div>

            </div>

        </div>

    </div>


    <!-- Letter -->

    <main id="letter-page">

        <div class="paper">

            <h1>Happy Anniversary</h1>

            <div class="heart">♡</div>

            <div class="letter">

                <p>My love,</p>

                <p>
                    This is where your letter will go.
                </p>

                <p>
                    Replace this text with your own letter tomorrow.
                </p>

                <p>
                    Every paragraph should be inside its own &lt;p&gt; tag.
                </p>

                <p>
                    With all my love,
                    <br><br>
                    Your name 💗
                </p>

            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
